# Minimal Supabase local config for Sun* Kudos Live board.
# Full config will be generated by `supabase init` once the CLI is
# installed (T001 — deferred). Values here mirror the defaults so
# `supabase start` can pick this up without overriding existing state.

project_id = "saa-2025"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true
