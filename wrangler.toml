name = "agentic-coding-saa-2025"
main = ".open-next/worker.js"
compatibility_date = "2026-04-17"
compatibility_flags = ["nodejs_compat"]

# Static assets produced by @opennextjs/cloudflare.
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Placeholder for non-secret public env vars. Real secrets (service role key,
# OAuth credentials) MUST be set via `wrangler secret put` — never committed.
# [vars]
# NEXT_PUBLIC_SITE_URL = ""
# NEXT_PUBLIC_SUPABASE_URL = ""
# NEXT_PUBLIC_SUPABASE_ANON_KEY = ""
# ALLOWED_EMAIL_DOMAINS = "sun-asterisk.com"

# Response-header transforms for the OAuth-friendly CSP + baseline security
# headers (plan T073). Adjust CSP sources once a final analytics vendor /
# third-party endpoint list is chosen.
# [env.production]
# routes = [{ pattern = "saa.sun-asterisk.com", custom_domain = true }]
